name: Upstream contract tests

# The composition contracts (curated PolicyEngine parameter paths, output
# variable names, boe_var schema) are slow-marked and skipped on PR CI.
# This job runs them for real — nightly and on demand — with a full
# policyengine install, and POLICYENGINE_MACRO_REQUIRE_PE=1 turns install/model
# failures into hard failures instead of green skips.
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  contracts:
    name: PolicyEngine + boe_var contracts (slow, full install)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: integration
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Pinned to a tag that exists: astral-sh/setup-uv publishes no moving
      # `v8` major tag, so `@v8` failed to resolve and this nightly job had
      # been erroring out in ~5s at "Set up job" since the action bump in #36.
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Install with full models
        run: uv pip install --system -e ".[models]" pytest
      - name: Contract and real-model benchmarks (failures fail, never skip)
        run: >-
          pytest
          tests/test_contract.py
          tests/test_og.py::test_og_build_policy_real
          tests/test_frbus.py::test_model_and_data_files_resolve_from_installed_package
          tests/test_frbus.py::test_tracking_invariant_holds_after_init_trac
          tests/test_frbus.py::test_monetary_tightening_has_the_documented_signs_and_magnitudes
          --runslow -q
        env:
          POLICYENGINE_MACRO_REQUIRE_PE: "1"
